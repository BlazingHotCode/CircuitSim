name: Package Builds

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  windows:
    name: Windows Installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install WiX Toolset v3
        shell: powershell
        run: |
          choco upgrade wixtoolset --no-progress -y
          $wixBin = 'C:\Program Files (x86)\WiX Toolset v3.14\bin'
          if (-not (Test-Path $wixBin)) {
            throw "WiX bin directory not found at $wixBin"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $wixBin

      - name: Build Windows packages
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\package-windows.ps1

      - name: Archive Windows portable app
        shell: powershell
        run: |
          $version = (Get-Content .\build\version.txt -Raw).Trim()
          $portableZip = "build/package/windows/CircuitSim-windows-portable-$version.zip"
          if (Test-Path $portableZip) {
            Remove-Item $portableZip -Force
          }
          Compress-Archive -Path build/package/windows/CircuitSim\* -DestinationPath $portableZip

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CircuitSim-Windows-Installer
          path: build/package/windows/CircuitSim-*.exe
          if-no-files-found: error

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CircuitSim-Windows-Portable
          path: build/package/windows/CircuitSim-windows-portable-*.zip
          if-no-files-found: error

  linux:
    name: Linux Packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm flatpak flatpak-builder
          sudo flatpak remote-add --system --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install --system -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08 org.freedesktop.Sdk.Extension.openjdk21//24.08

      - name: Build Linux packages
        run: |
          chmod +x ./scripts/build-jar.sh ./scripts/package-linux.sh ./scripts/package-flatpak.sh ./scripts/run-dev.sh
          ./scripts/package-linux.sh
          ./scripts/package-flatpak.sh

      - name: Archive Linux app image
        run: |
          version="$(tr -d '\r\n' < ./build/version.txt)"
          tar -C build/package/linux -czf "build/package/linux/CircuitSim-linux-app-image-$version.tar.gz" CircuitSim

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: CircuitSim-Linux-DEB
          path: build/package/linux/circuitsim_*.deb
          if-no-files-found: error

      - name: Upload Linux rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: CircuitSim-Linux-RPM
          path: build/package/linux/circuitsim-*.rpm
          if-no-files-found: error

      - name: Upload Linux portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CircuitSim-Linux-Portable
          path: build/package/linux/CircuitSim-linux-portable-*.tar.gz
          if-no-files-found: error

      - name: Upload Linux app-image artifact
        uses: actions/upload-artifact@v4
        with:
          name: CircuitSim-Linux-AppImage
          path: build/package/linux/CircuitSim-linux-app-image-*.tar.gz
          if-no-files-found: error

      - name: Upload Linux flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: CircuitSim-Linux-Flatpak
          path: build/package/flatpak/*.flatpak
          if-no-files-found: error
