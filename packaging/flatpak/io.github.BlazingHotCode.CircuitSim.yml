app-id: io.github.BlazingHotCode.CircuitSim
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk21
command: circuitsim
finish-args:
  - --share=ipc
  - --socket=x11
modules:
  - name: circuitsim
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk21/bin/jlink --module-path /usr/lib/sdk/openjdk21/jmods --add-modules java.base,java.desktop,java.net.http --output runtime --strip-debug --no-man-pages --no-header-files --compress=2
      - install -Dm755 circuitsim.sh /app/bin/circuitsim
      - mkdir -p /app/jre
      - cp -a runtime/. /app/jre/
      - install -Dm644 CircuitSim.jar /app/lib/CircuitSim.jar
      - install -Dm644 io.github.BlazingHotCode.CircuitSim.desktop /app/share/applications/io.github.BlazingHotCode.CircuitSim.desktop
      - install -Dm644 io.github.BlazingHotCode.CircuitSim.metainfo.xml /app/share/metainfo/io.github.BlazingHotCode.CircuitSim.metainfo.xml
      - install -Dm644 io.github.BlazingHotCode.CircuitSim.png /app/share/icons/hicolor/256x256/apps/io.github.BlazingHotCode.CircuitSim.png
    sources:
      - type: file
        path: ../../build/package-input/flatpak/CircuitSim.jar
      - type: file
        path: ./circuitsim.sh
      - type: file
        path: ./io.github.BlazingHotCode.CircuitSim.desktop
      - type: file
        path: ./io.github.BlazingHotCode.CircuitSim.metainfo.xml
      - type: file
        path: ../circuitsim.png
        dest-filename: io.github.BlazingHotCode.CircuitSim.png
